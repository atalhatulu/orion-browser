<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Orion Browser</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div id="drag-region"></div>

  <div class="orion-browser">
      
      <!-- ÜST BAR (LINK BAR) -->
      <div class="floating-header zone-container" id="zone-header">
          <div class="zone-controls">
              <button class="zone-up-btn" title="Yukarı Taşı">▲</button>
              <button class="zone-down-btn" title="Aşağı Taşı">▼</button>
          </div>
          <div class="header-left">
              <span id="nav-back" title="Geri" class="icon-btn" style="opacity: 0.3; pointer-events: none;">&larr;</span>
              <span id="nav-fwd" title="İleri" class="icon-btn" style="opacity: 0.3; pointer-events: none;">&rarr;</span>
          </div>

          <div class="header-center">
              <span id="nav-reload" title="Yenile" class="icon-btn" style="margin-right: 5px;">↻</span>
              <input type="text" id="url-input" placeholder="Google'da ara veya URL gir..." autocomplete="off" spellcheck="false" />
              <span id="new-tab-btn" title="Yeni Sekme" class="icon-btn" style="font-size: 20px; font-weight: bold; color: var(--accent); padding-bottom: 6px; margin-left: 5px;">+</span>
          </div>

          <div class="header-right">
              <span id="settings-btn" title="Ayarlar" class="icon-btn">⚙</span>
              <span class="header-divider"></span>
              <div id="window-controls" class="orion-dots">
                  <button class="win-btn minimize" id="min-btn">▽</button>
                  <button class="win-btn maximize" id="max-btn">◻</button>
                  <button class="win-btn close" id="close-btn">✕</button>
              </div>
          </div>
      </div>

      <!-- ANA SÖRF ALANI -->
      <div class="surfing-area zone-container" id="zone-surf">
          <div class="zone-controls">
              <button class="zone-up-btn" title="Yukarı Taşı">▲</button>
              <button class="zone-down-btn" title="Aşağı Taşı">▼</button>
          </div>
          <div id="content-area"></div>
          
          <!-- Webview Tıklama Kalkanı -->
          <div id="webview-click-shield"></div>
          
          <!-- DÜZENLEME MODU PENCERESİ (ORTADA) -->
          <div id="magic-overlay-panel" class="magic-overlay-panel">
              <h3 style="margin: 0; color: white; font-weight: 500;">✨ Düzenleme Modu</h3>
              <p style="margin: 0; font-size: 13px; color: rgba(255,255,255,0.6); text-align: center; max-width: 250px;">
                  Panelleri sağdaki oklarla yukarı veya aşağı taşıyın. İşiniz bitince kaydedin.
              </p>
              <div style="display: flex; gap: 10px; margin-top: 5px;">
                  <button id="magic-save-btn" class="magic-btn save">Kaydet</button>
                  <button id="magic-cancel-btn" class="magic-btn cancel">İptal Et</button>
              </div>
          </div>
          
          <button id="prev-tab-btn" class="tab-switch-btn left-switch" title="Önceki Sekme" style="display: none;">&lang;</button>
          <button id="next-tab-btn" class="tab-switch-btn right-switch" title="Sonraki Sekme" style="display: none;">&rang;</button>
      </div>

      <!-- ALT DURUM ÇUBUĞU (INFO BAR) -->
      <div class="bottom-bar zone-container" id="zone-bottom">
          <div class="zone-controls">
              <button class="zone-up-btn" title="Yukarı Taşı">▲</button>
              <button class="zone-down-btn" title="Aşağı Taşı">▼</button>
          </div>
          <div class="bottom-left">
              <span class="status-badge glass-badge">Orion v1.0.0</span>
              <span class="dot-sep">&bull;</span>
              <span id="tracker-count" class="toggleable-status" title="Reklam Engelleyici">🛡️ 0 Engellendi</span>
              <span class="dot-sep">&bull;</span>
              <span id="vpn-toggle" class="toggleable-status">🌍 VPN Kapalı</span>
          </div>
          
          <div class="dots-area">
              <div class="bottom-center" id="tab-dots-container"></div>
              <div class="broom-wrapper">
                  <span id="close-all-tabs-btn" title="Tüm Sekmeleri Temizle" class="icon-btn" style="color: #ff5f56; font-size: 14px;">🧹</span>
              </div>
          </div>
          
          <div class="bottom-right">
              <span id="download-status" class="net-speed" style="display: none; color: #3b82f6;">📥 İndiriliyor...</span>
              <span id="download-sep" class="dot-sep" style="display: none;">&bull;</span>
              <span class="net-speed" id="net-speed-display">-- Mbps</span>
          </div>
      </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
