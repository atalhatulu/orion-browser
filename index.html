<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Orion Browser</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div id="drag-region"></div>

  <div class="orion-browser">
      
      <!-- ÜST BAR -->
      <div class="floating-header">
          <div class="header-left">
              <span id="nav-back" title="Geri">&larr;</span>
              <span id="nav-fwd" title="İleri">&rarr;</span>
          </div>

          <div class="header-center">
              <span id="nav-reload" title="Yenile" class="icon-btn">&#8635;</span>
              <input type="text" id="url-input" placeholder="Google'da ara veya URL gir..." autocomplete="off" spellcheck="false" />
              <span id="new-tab-btn" title="Yeni Sekme" class="icon-btn" style="font-size: 20px; font-weight: bold;">+</span>
              <span id="close-tab-btn" title="Geçerli Sekmeyi Kapat" class="icon-btn" style="font-size: 20px; font-weight: bold; color: #ff5f56;">&times;</span>
          </div>

          <div class="header-right">
              <span id="settings-btn" title="Ayarlar" class="icon-btn">⚙</span>
              <span class="header-divider"></span>
              <div id="window-controls" class="orion-dots">
                  <button class="win-btn minimize" id="min-btn"></button>
                  <button class="win-btn maximize" id="max-btn"></button>
                  <button class="win-btn close" id="close-btn"></button>
              </div>
          </div>
      </div>

      <!-- ANA SÖRF ALANI -->
      <div class="surfing-area">
          <button id="prev-tab-btn" class="tab-switch-btn left-switch" title="Önceki Sekme">&lang;</button>
          <button id="next-tab-btn" class="tab-switch-btn right-switch" title="Sonraki Sekme">&rang;</button>
          
          <div id="content-area"></div>
      </div>

      <!-- ALT DURUM ÇUBUĞU -->
      <div class="bottom-bar">
          <div class="bottom-left">
              <span class="status-badge glass-badge">Orion Core</span>
              <span class="dot-sep">&bull;</span>
              <span id="tracker-count">0 İzleyici Engellendi</span>
              <span class="dot-sep">&bull;</span>
              <span class="status-secure">🔒 Güvenli Ağ</span>
          </div>
          
          <div class="bottom-center" id="tab-dots-container"></div>
          
          <div class="bottom-right">
              <span id="download-status" class="net-speed" style="display: none; color: #3b82f6;">📥 İndiriliyor...</span>
              <span id="download-sep" class="dot-sep" style="display: none;">&bull;</span>
              <span class="net-speed">Yükleniyor...</span>
          </div>
      </div>

  </div>

  <!-- AYARLAR MODALI -->
  <div id="settings-modal" class="modal-overlay" style="display: none;">
      <div class="modal-content glass-panel">
          <span class="modal-close" id="close-settings">&times;</span>
          <h2>🌌 Orion Özelleştirme Merkezi</h2>
          
          <div class="settings-group">
              <label>Arka Plan Rengi (Tema):</label>
              <input type="color" id="set-color" value="#0d0d0d" style="background:transparent; border:none; cursor:pointer;">
          </div>
          <div class="settings-group">
              <label>Pencere Kavis Miktarı:</label>
              <input type="range" id="set-radius" min="0" max="30" value="12">
          </div>
          <div class="settings-group">
              <label>Arayüz Dizilimi:</label>
              <select id="set-layout">
                  <option value="top">Klasik (Üstte Arama)</option>
                  <option value="bottom">Mobil / Alt (Arama Altta)</option>
              </select>
          </div>
          <div class="settings-group">
              <label>Tarayıcı Motoru Güvenliği:</label>
              <input type="checkbox" checked disabled> <span style="font-size:12px; color:#4ade80;">(Chromium Kalkanı Açık)</span>
          </div>

          <div class="settings-group" style="margin-top: 20px; text-align: center;">
              <p style="color: rgba(255,255,255,0.4); font-size: 11px;">Orion Browser v1.0.0<br>Sınırları Kaldır, Şeklini Sen Ver.</p>
          </div>
      </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
